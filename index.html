<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPro IT Support & Services</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; color: #333; }

        nav {
            background: #0f1b2d;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo { color: #00d4ff; font-size: 22px; font-weight: bold; }
        nav ul { list-style: none; display: flex; gap: 25px; }
        nav ul li a { color: white; text-decoration: none; font-size: 15px; transition: 0.3s; }
        nav ul li a:hover { color: #00d4ff; }

        .hero {
            background: linear-gradient(135deg, #0f1b2d 0%, #1a3a5c 50%, #0f1b2d 100%);
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.15), transparent);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .hero h1 { font-size: 50px; margin-bottom: 15px; z-index: 1; }
        .hero h1 span { color: #00d4ff; }
        .hero p { font-size: 18px; margin-bottom: 35px; opacity: 0.85; max-width: 600px; z-index: 1; line-height: 1.7; }
        .hero-btns { display: flex; gap: 15px; z-index: 1; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 14px 35px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            border: none;
        }
        .btn-primary { background: #00d4ff; color: #0f1b2d; font-weight: bold; }
        .btn-primary:hover { background: #00b8d9; transform: translateY(-2px); }
        .btn-outline { background: transparent; color: white; border: 2px solid #00d4ff; }
        .btn-outline:hover { background: #00d4ff; color: #0f1b2d; }

        .section-title { text-align: center; padding: 55px 20px 10px; font-size: 34px; color: #0f1b2d; }
        .section-title span { color: #00d4ff; }
        .section-subtitle { text-align: center; color: #666; margin-bottom: 45px; font-size: 16px; }
